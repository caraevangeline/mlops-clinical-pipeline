version: '3.8'

# Shared environment variables for all Airflow services
x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.10
  environment:
    _PIP_ADDITIONAL_REQUIREMENTS: "scikit-learn==1.4.0 xgboost==2.0.3 pandas==2.1.4 numpy==1.26.3 scipy==1.12.0 mlflow==2.10.2 boto3==1.34.34"
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    MLFLOW_TRACKING_URI: http://mlflow:5000
    DATA_PATH: /opt/airflow/data/heart_failure_clinical_records.csv
    HEARTBEAT_FILE: /opt/airflow/artifacts/pipeline_heartbeat.json
    REFERENCE_STATS_PATH: /opt/airflow/artifacts/reference_stats.json
    PYTHONPATH: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/data
    - artifacts:/opt/airflow/artifacts
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_db_volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /sources/logs /sources/dags /sources/plugins /sources/data
        chown -R "${AIRFLOW_UID:-50000}:0" /sources/{logs,dags,plugins,data}
        mkdir -p /opt/airflow/artifacts
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/artifacts
        mkdir -p /mlflow_init
        chown -R "${AIRFLOW_UID:-50000}:0" /mlflow_init
        exec /entrypoint airflow version
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DATA_PATH: /opt/airflow/data/heart_failure_clinical_records.csv
      HEARTBEAT_FILE: /opt/airflow/artifacts/pipeline_heartbeat.json
      REFERENCE_STATS_PATH: /opt/airflow/artifacts/reference_stats.json
      PYTHONPATH: /opt/airflow
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    user: "0:0"
    volumes:
      - .:/sources
      - mlflow_db:/mlflow_init

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    user: "50000:0"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /opt/airflow/artifacts/mlflow
    ports:
      - "5000:5000"
    volumes:
      - artifacts:/opt/airflow/artifacts
      - mlflow_db:/mlflow
    restart: always

volumes:
  postgres_db_volume:
  artifacts:
  mlflow_db:
